<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Ouvidoria EEEP Dom Walfrido</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- LOADER -->
    <div id="loader-overlay" class="d-none">
        <div class="spinner-border text-light" role="status"></div>
        <p>Processando...</p>
    </div>

    <section id="tela-login" class="animate__animated animate__fadeIn">
        <div class="card-login animate__animated animate__zoomIn">

            <div class="text-center mb-4">
                <div class="login-icon"><i class="fas fa-university"></i></div>
                <h2 class="login-titulo">Entrar no Sistema</h2>
                <p class="text-muted small mb-0">EEEP Dom Walfrido Teixeira Vieira</p>
            </div>

            <form id="formLogin" novalidate>
                <div class="mb-3">
                    <label class="form-label">E-mail ou CPF</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" class="form-control" id="loginUser"
                            placeholder="aluno@escola.ce.gov.br ou 000.000.000-00" required>
                    </div>
                </div>

                <div class="mb-1">
                    <label class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" class="form-control" id="loginPass"
                            placeholder="••••••••" required>
                    </div>
                </div>
                <div class="text-end mb-3">
                    <a href="#" class="link-suave">Esqueci minha senha</a>
                </div>

                <div id="loginError" class="alerta-erro d-none mb-3 animate__animated animate__shakeX">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span id="loginErrorMsg">Usuário ou senha inválidos.</span>
                </div>

                <button type="submit" class="btn-entrar w-100 mb-3">
                    <i class="fas fa-sign-in-alt me-2"></i>Entrar no Sistema
                </button>
                <button type="button" class="btn btn-outline-secondary w-100 rounded-pill mb-3"
                    onclick="window.location.href='index.html'">
                    <i class="fas fa-arrow-left me-2"></i>Voltar
                </button>

                <div class="text-center border-top pt-3">
                    <span class="small text-muted">Não possui conta? </span>
                    <a href="cadastro.html" class="link-verde small">Cadastre-se agora</a>
                </div>
            </form>

        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/login.js"></script>
</body>
</html>

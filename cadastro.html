<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Ouvidoria EEEP Dom Walfrido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        #tela-cadastro {
            background: var(--azul);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
            position: relative;
            overflow: hidden;
        }
        #tela-cadastro::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,166,90,.15) 0%, transparent 65%);
            top: -200px; right: -200px;
            pointer-events: none;
        }
        #tela-cadastro::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,166,90,.08) 0%, transparent 65%);
            bottom: -150px; left: -100px;
            pointer-events: none;
        }
        .card-cadastro {
            background: rgba(255,255,255,.98);
            border: none;
            border-radius: 24px;
            box-shadow: var(--sombra-lg);
            padding: 2.6rem 2.8rem;
            max-width: 580px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        #forca-barra {
            height: 4px;
            border-radius: 99px;
            transition: all .4s ease;
            background: var(--borda);
            width: 0;
        }
        #forca-barra.fraca  { background: #ef4444; width: 33%; }
        #forca-barra.media  { background: var(--dourado); width: 66%; }
        #forca-barra.forte  { background: var(--verde); width: 100%; }
        #forca-texto { font-size: .74rem; font-weight: 600; transition: color .3s; }

        .tipo-selector { display: flex; gap: .75rem; }
        .tipo-btn {
            flex: 1;
            border: 1.5px solid var(--borda);
            border-radius: var(--radius-sm);
            padding: .8rem .5rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transicao);
            font-size: .82rem;
            font-weight: 600;
            color: var(--texto-suave);
            background: var(--fundo);
        }
        .tipo-btn i { display: block; font-size: 1.4rem; margin-bottom: .35rem; opacity: .4; transition: var(--transicao); }
        .tipo-btn.ativo { border-color: var(--verde); background: var(--verde-claro); color: var(--verde-escuro); }
        .tipo-btn.ativo i { opacity: 1; color: var(--verde); }
        input[type="radio"].tipo-radio { display: none; }

        @media (max-width: 600px) {
            .card-cadastro { padding: 2rem 1.5rem; border-radius: 20px; }
        }
    </style>
</head>
<body>

<!-- LOADER -->
<div id="loader-overlay" class="d-none">
    <div class="spinner-border" role="status"></div>
    <p>Criando sua conta...</p>
</div>

<section id="tela-cadastro">
    <div class="card-cadastro animate__animated animate__fadeInUp">

        <div class="text-center mb-4">
            <div class="login-icon" style="background:linear-gradient(145deg,var(--verde),var(--verde-escuro))">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2 class="login-titulo">Criar Conta</h2>
            <p style="color:var(--texto-muted);font-size:.85rem;margin-top:.3rem">EEEP Dom Walfrido Teixeira Vieira</p>
        </div>

        <div id="feedback-cadastro" class="d-none mb-3"></div>

        <form id="formCadastro" novalidate>

            <!-- Tipo -->
            <div class="mb-4">
                <label class="form-label">Você é...</label>
                <div class="tipo-selector">
                    <label class="tipo-btn ativo" id="btn-aluno">
                        <input class="tipo-radio" type="radio" name="tipo" value="aluno" checked>
                        <i class="fas fa-user-graduate"></i>
                        Aluno(a)
                    </label>
                    <label class="tipo-btn" id="btn-colaborador">
                        <input class="tipo-radio" type="radio" name="tipo" value="colaborador">
                        <i class="fas fa-chalkboard-teacher"></i>
                        Colaborador
                    </label>
                </div>
            </div>

            <!-- Nome -->
            <div class="mb-3">
                <label class="form-label">Nome Completo</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="cadNome" placeholder="Seu nome completo" required>
                </div>
            </div>

            <!-- CPF + Telefone -->
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label">CPF</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                        <input type="text" class="form-control" id="cadCpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Telefone <span style="color:var(--texto-muted);font-weight:400;font-size:.75rem;text-transform:none;letter-spacing:0">(opcional)</span></label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-phone"></i></span>
                        <input type="text" class="form-control" id="cadTelefone" placeholder="(88) 99999-9999" maxlength="15">
                    </div>
                </div>
            </div>

            <!-- E-mail -->
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" id="cadEmail" placeholder="aluno@escola.ce.gov.br" required>
                </div>
            </div>

            <!-- Senha -->
            <div class="mb-1">
                <label class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="cadSenha" placeholder="Mínimo 8 caracteres" required>
                    <button type="button" class="input-group-text" id="toggleSenha"
                        style="cursor:pointer;background:var(--fundo);border:1.5px solid var(--borda);border-left:none">
                        <i class="fas fa-eye" id="iconeSenha" style="color:var(--texto-muted)"></i>
                    </button>
                </div>
            </div>
            <div class="mb-3">
                <div id="forca-barra" class="mt-2 mb-1"></div>
                <span id="forca-texto" style="color:var(--texto-muted)">Digite uma senha</span>
            </div>

            <!-- Confirmar senha -->
            <div class="mb-4">
                <label class="form-label">Confirmar Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="cadConfirma" placeholder="Repita a senha" required>
                </div>
                <div id="confirma-erro" class="d-none mt-1" style="font-size:.78rem;color:#ef4444">
                    <i class="fas fa-exclamation-circle me-1"></i>As senhas não coincidem.
                </div>
            </div>

            <button type="submit" class="btn-entrar w-100 mb-3">
                <i class="fas fa-user-plus me-2"></i>Criar Minha Conta
            </button>

            <button type="button" class="w-100 mb-4"
                style="background:transparent;border:1.5px solid var(--borda);color:var(--texto-suave);font-weight:600;border-radius:var(--radius-sm);padding:.7rem;font-size:.88rem;transition:var(--transicao);cursor:pointer"
                onmouseover="this.style.borderColor='var(--verde)';this.style.color='var(--verde)'"
                onmouseout="this.style.borderColor='var(--borda)';this.style.color='var(--texto-suave)'"
                onclick="window.location.href='login.html'">
                <i class="fas fa-arrow-left me-2"></i>Voltar para o Login
            </button>

            <div class="text-center pt-3" style="border-top:1px solid var(--borda)">
                <span style="font-size:.84rem;color:var(--texto-muted)">Já possui conta? </span>
                <a href="login.html" class="link-verde" style="font-size:.84rem">Entrar agora</a>
            </div>

        </form>
    </div>
</section>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/cadastro.js"></script>
</body>
</html>
